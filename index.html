<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthetic Nature</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://db.onlinewebfonts.com/c/2bf40ab72ea4897a3fd9b6e48b233a19?family=Garamond">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ---------- reset / base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: #010101;
        }

        body {
            color: #ffffff;
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-garamond {
            font-family: 'Garamond', 'Times New Roman', serif;
        }

        .hidden {
            display: none !important;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        /* ---------- liquid glass ---------- */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
                    rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.15) 20%,
                    rgba(255, 255, 255, 0) 40%, rgba(255, 255, 255, 0) 60%,
                    rgba(255, 255, 255, 0.15) 80%, rgba(255, 255, 255, 0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .liquid-glass:hover {
            background: rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.15);
        }

        .liquid-glass:active {
            transform: scale(0.98);
        }

        /* ---------- page shell ---------- */
        .hero-main {
            position: relative;
            background: #010101;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .video-wrap {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        #bg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* dark gradient so text stays legible over the footage */
        .video-scrim {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.15) 35%, rgba(0,0,0,0.35) 75%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        /* ---------- navigation ---------- */
        .navbar {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 22px 20px;
        }

        @media (min-width: 768px) {
            .navbar {
                justify-content: center;
                gap: 64px;
                padding: 28px 32px;
            }
        }

        .brand {
            color: #ffffff;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 13px;
            white-space: nowrap;
        }

        @media (min-width: 768px) {
            .brand {
                letter-spacing: 0.3em;
                font-size: 14px;
            }
        }

        .nav-links {
            display: none;
            align-items: center;
            gap: 36px;
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex;
            }
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 12px;
            font-weight: 300;
            transition: color 300ms ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        .hamburger {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #ffffff;
            width: 32px;
            height: 32px;
            padding: 0;
        }

        @media (min-width: 768px) {
            .hamburger {
                display: none;
            }
        }

        .hamburger svg {
            width: 22px;
            height: 22px;
        }

        /* ---------- mobile menu ---------- */
        .mobile-menu {
            position: fixed;
            top: 64px;
            left: 16px;
            right: 16px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 32px 0;
            border-radius: 1rem;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
        }

        .mobile-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        @media (min-width: 768px) {
            .mobile-menu {
                display: none;
            }
        }

        .mobile-menu-glass {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .mobile-menu a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 300;
            font-size: 13px;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out, color 300ms ease;
        }

        .mobile-menu.open a {
            opacity: 1;
            transform: translateY(0);
        }

        .mobile-menu a:hover {
            color: #ffffff;
        }

        /* per-link stagger delay, set via inline style transition-delay too */

        /* ---------- hero content ---------- */
        .hero-section {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
            padding-top: 48px;
            margin-top: -64px;
        }

        @media (min-width: 640px) {
            .hero-section {
                padding-left: 32px;
                padding-right: 32px;
                padding-top: 64px;
            }
        }

        @media (min-width: 768px) {
            .hero-section {
                padding-top: 96px;
            }
        }

        .headline {
            font-weight: 400;
            color: #ffffff;
            line-height: 1.08;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            font-size: 2.25rem; /* 4xl */
        }

        @media (min-width: 640px) {
            .headline {
                margin-bottom: 32px;
                font-size: 3.75rem; /* 6xl */
            }
        }

        @media (min-width: 768px) {
            .headline {
                font-size: 6rem; /* 8xl */
            }
        }

        @media (min-width: 1024px) {
            .headline {
                font-size: 8rem; /* 9xl */
            }
        }

        .headline-line {
            display: block;
            white-space: nowrap;
        }

        .char {
            display: inline-block;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        .char.show {
            opacity: 1;
        }

        .char.space {
            width: 0.28em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 300;
            line-height: 1.6;
            max-width: 20rem;
            margin-bottom: 32px;
            font-size: 0.875rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .subtitle.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (min-width: 640px) {
            .subtitle {
                max-width: 28rem;
                margin-bottom: 40px;
                font-size: 1rem;
            }
        }

        @media (min-width: 768px) {
            .subtitle {
                font-size: 1.125rem;
            }
        }

        .subtitle .mobile-break {
            display: none;
        }

        @media (min-width: 640px) {
            .subtitle .mobile-break {
                display: inline;
            }
        }

        .cta-button {
            border-radius: 9999px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 13px;
            font-weight: 400;
            padding: 14px 28px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease, background 0.3s, box-shadow 0.3s;
        }

        .cta-button.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (min-width: 640px) {
            .cta-button {
                padding: 16px 40px;
                letter-spacing: 0.2em;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .char, .subtitle, .cta-button, .mobile-menu, .mobile-menu a {
                transition: none !important;
                opacity: 1 !important;
                transform: none !important;
            }
        }
    </style>
</head>

<body>

    <main class="hero-main">

        <!-- Background video -->
        <div class="video-wrap">
            <video id="bg-video" autoplay muted loop playsinline
                src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260619_191346_9d19d66e-86a4-47f7-8dc6-712c1788c3b2.mp4"></video>
            <div class="video-scrim"></div>
        </div>

        <!-- Navigation -->
        

        <!-- Mobile menu -->
        

        <!-- Hero -->
        <section class="hero-section">
            <h1 class="headline font-garamond">
                <span class="headline-line" id="line1"></span>
                <span class="headline-line" id="line2"></span>
            </h1>

            <p class="subtitle" id="subtitle">
                Twelve Rooms. Twelve Worlds<br class="mobile-break">
                One studio
            </p>

            <a href="dashboard.html"><button class="cta-button liquid-glass" id="ctaButton">Begin the Experience</button></a>
        </section>

    </main>

    <script>
        /* ============================================================
           Vanilla equivalent of the StaggeredFade component:
           splits a string into per-character spans and fades each in
           with a stagger, triggered once when the heading scrolls
           into view (here: on load, since it's the hero).
        ============================================================ */
        function buildStaggeredLine(container, text, charStartIndex) {
            var frag = document.createDocumentFragment();
            for (var i = 0; i < text.length; i++) {
                var ch = text[i];
                var span = document.createElement('span');
                span.className = 'char' + (ch === ' ' ? ' space' : '');
                span.textContent = ch === ' ' ? '\u00A0' : ch;
                var delay = (charStartIndex + i) * 0.07;
                span.style.transitionDelay = delay + 's';
                frag.appendChild(span);
            }
            container.appendChild(frag);
        }

        var line1Text = 'WITNESS THE';
        var line2Text = 'HIDDEN REALM';
        var line1El = document.getElementById('line1');
        var line2El = document.getElementById('line2');

        buildStaggeredLine(line1El, line1Text, 0);
        buildStaggeredLine(line2El, line2Text, line1Text.length);

        function revealHeadline() {
            document.querySelectorAll('.char').forEach(function (el) {
                el.classList.add('show');
            });
        }

        // Trigger once when the hero is in view (it always is on load,
        // but IntersectionObserver mirrors the spec's useInView/once:true behavior)
        var headline = document.querySelector('.headline');
        if ('IntersectionObserver' in window) {
            var io = new IntersectionObserver(function (entries, obs) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        revealHeadline();
                        obs.disconnect();
                    }
                });
            }, { threshold: 0.1 });
            io.observe(headline);
        } else {
            revealHeadline();
        }

        /* ---------- subtitle + CTA entrance (delay 1.6s / 2.0s) ---------- */
        setTimeout(function () {
            document.getElementById('subtitle').classList.add('show');
        }, 1600);

        setTimeout(function () {
            document.getElementById('ctaButton').classList.add('show');
        }, 2000);

        /* ---------- mobile menu toggle (AnimatePresence equivalent) ---------- */
        var menuToggle = document.getElementById('menuToggle');
        var mobileMenu = document.getElementById('mobileMenu');
        var menuIcon = document.getElementById('menuIcon');
        var closeIcon = document.getElementById('closeIcon');
        var menuOpen = false;

        menuToggle.addEventListener('click', function () {
            menuOpen = !menuOpen;
            mobileMenu.classList.toggle('open', menuOpen);
            menuIcon.classList.toggle('hidden', menuOpen);
            closeIcon.classList.toggle('hidden', !menuOpen);
        });

        mobileMenu.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('click', function () {
                menuOpen = false;
                mobileMenu.classList.remove('open');
                menuIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
            });
        });
    </script>

</body>

</html>
